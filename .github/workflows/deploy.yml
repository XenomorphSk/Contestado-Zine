name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Altere para o nome da sua branch principal se for diferente (ex: master)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Setup Node.js 
        uses: actions/setup-node@v3
        with:
          node-version: 18 # Ou a versão que você usou localmente (ex: 16, 20)
          cache: "npm"

      - name: Install dependencies 
        run: npm install

      - name: Build 🏗️
        run: npm run build

      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Personalize o subdomínio se necessário. Por padrão, usa o nome do repositório.
          # cname: example.com